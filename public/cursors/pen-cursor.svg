<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Pen nib body (yellow) -->
  <polygon points="4,2 12,0 18,10 18,18 10,18" fill="#E5B918"/>
  <!-- Pen tip -->
  <polygon points="4,2 1,0 10,10" fill="#E5B918"/>
  <!-- Circle hole -->
  <circle cx="13" cy="13" r="3" fill="white"/>
  <circle cx="13" cy="13" r="1.5" fill="black"/>
  <!-- Pen grip (black) -->
  <rect x="16" y="18" width="12" height="10" rx="2" fill="black" transform="rotate(-5 22 23)"/>
</svg>